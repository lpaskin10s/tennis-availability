<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NSRC Early Birds — Tennis Availability</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Early Birds">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#142B3D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --court-navy: #142B3D;
    --court-navy-deep: #0B1B28;
    --panel: #1B3A50;
    --ball-yellow: #D7F23C;
    --ball-yellow-dim: #A9C22C;
    --chalk: #F2F5F0;
    --clay: #C1502B;
    --clay-dim: #8F3C20;
    --net-gray: #8CA0AF;
    --line: rgba(242,245,240,0.14);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--court-navy);
    color: var(--chalk);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 0 0 60px 0;
  }

  .header {
    background: var(--court-navy-deep);
    border-bottom: 2px solid var(--line);
    padding: 28px 20px 22px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: "";
    position: absolute;
    top: -60%;
    left: 50%;
    transform: translateX(-50%);
    width: 140%;
    height: 220%;
    border: 2px solid var(--line);
    border-radius: 50%;
    pointer-events: none;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--ball-yellow);
    position: relative;
  }

  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(28px, 6vw, 42px);
    margin: 6px 0 4px;
    letter-spacing: -0.01em;
    position: relative;
  }

  .week-range {
    color: var(--net-gray);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    position: relative;
  }

  .admin-pill {
    display: inline-block;
    margin-top: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    background: var(--clay);
    color: var(--chalk);
    padding: 3px 10px;
    border-radius: 100px;
    position: relative;
  }

  .version-tag {
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--net-gray);
    opacity: 0.6;
    position: relative;
  }

  .wrap {
    max-width: 880px;
    margin: 0 auto;
    padding: 28px 16px 0;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 24px;
  }

  .card.admin-card {
    border-color: var(--clay-dim);
  }

  .card h2 {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    margin: 0 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .card h2 .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    background: var(--ball-yellow);
    color: var(--court-navy-deep);
    padding: 3px 8px;
    border-radius: 100px;
    letter-spacing: 0.05em;
  }

  .card h2 .tag.admin {
    background: var(--clay);
    color: var(--chalk);
  }

  .card h2 .tag.subtle {
    background: var(--court-navy-deep);
    color: var(--net-gray);
    font-weight: 400;
    margin-left: auto;
  }

  .card h2 {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  label.field-label {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--net-gray);
    margin-bottom: 8px;
    font-weight: 600;
  }

  input[type="text"], textarea, select {
    width: 100%;
    background: var(--court-navy-deep);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    color: var(--chalk);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    margin-bottom: 18px;
  }

  select {
    appearance: none;
    -webkit-appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--ball-yellow) 50%), linear-gradient(135deg, var(--ball-yellow) 50%, transparent 50%);
    background-position: calc(100% - 20px) center, calc(100% - 15px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    cursor: pointer;
  }

  select option { background: var(--court-navy-deep); color: var(--chalk); }

  input[type="text"]:focus, textarea:focus, select:focus, button:focus-visible, .day-chip:focus-visible {
    outline: 2px solid var(--ball-yellow);
    outline-offset: 2px;
  }

  textarea { resize: vertical; min-height: 54px; }

  .day-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }

  .day-chip {
    background: var(--court-navy-deep);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    color: var(--chalk);
    transition: transform 0.1s ease, background 0.15s ease, border-color 0.15s ease;
    -webkit-tap-highlight-color: transparent;
  }

  .day-chip:hover { border-color: var(--ball-yellow-dim); }

  .day-chip .dow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    color: var(--net-gray);
    display: block;
  }

  .day-chip .dnum {
    font-family: 'Archivo Black', sans-serif;
    font-size: 18px;
    display: block;
    margin-top: 2px;
  }

  .day-chip.selected {
    background: var(--ball-yellow);
    border-color: var(--ball-yellow);
    transform: translateY(-2px);
  }

  .day-chip.selected .dow, .day-chip.selected .dnum { color: var(--court-navy-deep); }

  .day-chip.disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  .day-chip.closed-chip {
    opacity: 1;
    pointer-events: none;
    background: repeating-linear-gradient(45deg, var(--court-navy-deep), var(--court-navy-deep) 4px, #1f2f3a 4px, #1f2f3a 8px);
    border-color: var(--clay-dim);
  }
  .day-chip.closed-chip .dow, .day-chip.closed-chip .dnum { color: var(--clay); }

  .day-chip.admin-select.selected {
    background: var(--clay);
    border-color: var(--clay);
  }
  .day-chip.admin-select.selected .dow, .day-chip.admin-select.selected .dnum { color: var(--chalk); }

  .out-toggle {
    display: block;
    width: 100%;
    background: var(--court-navy-deep);
    border: 1px solid var(--line);
    color: var(--net-gray);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 18px;
    transition: all 0.15s ease;
  }
  .out-toggle:hover { border-color: var(--clay-dim); }
  .out-toggle.active {
    background: var(--clay);
    border-color: var(--clay);
    color: var(--chalk);
    font-weight: 700;
  }

  .out-badge {
    display: inline-block;
    margin-left: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.06em;
    color: var(--clay);
    border: 1px solid var(--clay);
    border-radius: 4px;
    padding: 1px 5px;
    vertical-align: middle;
  }
  tr.is-out { opacity: 0.55; }

  button.primary {
    background: var(--ball-yellow);
    color: var(--court-navy-deep);
    border: none;
    font-family: 'Archivo Black', sans-serif;
    font-size: 14px;
    padding: 13px 22px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    letter-spacing: 0.02em;
    transition: transform 0.1s ease;
  }
  button.primary:active { transform: scale(0.98); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  button.admin-btn {
    background: var(--clay);
    color: var(--chalk);
  }

  .status-msg {
    margin-top: 10px;
    font-size: 13px;
    color: var(--ball-yellow);
    font-family: 'Space Mono', monospace;
    min-height: 16px;
  }
  .status-msg.admin-status { color: var(--clay); }

  /* Scoreboard grid */
  .scoreboard-scroll { overflow-x: auto; }
  table.scoreboard {
    width: 100%;
    border-collapse: collapse;
    min-width: 680px;
  }
  table.scoreboard th, table.scoreboard td {
    padding: 10px 6px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    font-size: 13px;
  }
  table.scoreboard th.name-col, table.scoreboard td.name-col {
    text-align: left;
    padding-left: 4px;
    min-width: 120px;
  }
  table.scoreboard th {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--net-gray);
    text-transform: uppercase;
    font-weight: 400;
  }
  .mark-yes { color: var(--ball-yellow); font-size: 16px; }
  .mark-no { color: var(--net-gray); opacity: 0.4; font-size: 16px; }
  .mark-closed { color: var(--clay); font-size: 11px; font-family: 'Space Mono', monospace; }
  .note-cell { font-size: 11px; color: var(--net-gray); font-style: italic; max-width: 160px; }

  .stamp-row td { border-bottom: none; padding-top: 16px; }
  .stamp {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    padding: 5px 9px;
    border-radius: 5px;
    border: 2px solid currentColor;
    transform: rotate(-4deg);
  }
  .stamp.in { color: var(--ball-yellow); }
  .stamp.out { color: var(--clay); border-color: var(--clay); }
  .stamp.closed { color: var(--net-gray); border-color: var(--net-gray); }
  .count-sub { display: block; margin-top: 4px; font-size: 10px; color: var(--net-gray); font-family: 'Space Mono', monospace; }

  .empty-state {
    text-align: center;
    color: var(--net-gray);
    padding: 30px 10px;
    font-size: 14px;
  }

  .best-banner {
    background: var(--court-navy-deep);
    border: 1px solid var(--ball-yellow-dim);
    border-radius: 10px;
    padding: 16px 18px;
    margin-bottom: 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }
  .best-banner .ball {
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--ball-yellow);
    flex-shrink: 0;
    position: relative;
    margin-top: 2px;
  }
  .best-banner .ball::after {
    content: "";
    position: absolute; inset: 3px;
    border: 1.5px solid var(--court-navy-deep);
    border-radius: 50%;
    clip-path: inset(0 0 50% 0);
  }
  .best-banner .txt-main { font-family: 'Archivo Black', sans-serif; font-size: 15px; }
  .best-banner .txt-sub { color: var(--net-gray); font-size: 12px; margin-top: 2px; }

  .missing-note {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--clay);
    background: rgba(193,80,43,0.1);
    border: 1px solid var(--clay-dim);
    border-radius: 8px;
    padding: 9px 12px;
    margin-bottom: 14px;
  }
  .missing-note.ok {
    color: var(--ball-yellow);
    background: rgba(215,242,60,0.08);
    border-color: var(--ball-yellow-dim);
  }

  .small-btn {
    display: inline-block;
    background: none;
    border: 1px solid var(--net-gray);
    color: var(--chalk);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.03em;
    padding: 3px 8px;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 8px;
    vertical-align: middle;
  }
  .small-btn:hover { border-color: var(--ball-yellow); color: var(--ball-yellow); }

  .copy-lineup-btn {
    display: block;
    width: 100%;
    margin-top: 10px;
    background: var(--court-navy-deep);
    border: 1px solid var(--ball-yellow-dim);
    color: var(--ball-yellow);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    padding: 10px;
    border-radius: 8px;
    cursor: pointer;
  }
  .copy-lineup-btn:hover { background: rgba(215,242,60,0.08); }

  .footer-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 10px;
  }
  .link-btn {
    background: none;
    border: none;
    color: var(--net-gray);
    font-size: 12px;
    text-decoration: underline;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .link-btn:hover { color: var(--clay); }

  @media (max-width: 520px) {
    .day-grid { gap: 5px; }
    .day-chip { padding: 8px 2px; }
    .day-chip .dnum { font-size: 15px; }
    table.scoreboard { font-size: 11px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Tennis Availability</div>
  <h1>NSRC Early Birds</h1>
  <div class="week-range" id="weekRange">—</div>
  <div class="version-tag">v2.5</div>
  <div id="adminPillSlot"></div>
</div>

<div class="wrap">

  <div class="card">
    <h2>Your availability <span class="tag">1 court · need 4</span></h2>
    <label class="field-label" for="nameInput">Your name</label>
    <select id="nameInput">
      <option value="" disabled selected>Choose your name…</option>
    </select>

    <label class="field-label">Days you can play this week</label>
    <div class="day-grid" id="dayGrid"></div>
    <button type="button" class="out-toggle" id="outToggle">I'm out this week</button>

    <label class="field-label" for="noteInput">Notes (optional)</label>
    <textarea id="noteInput" placeholder="e.g. only after 6pm, can sub last minute"></textarea>

    <label class="field-label" for="maxStreakInput">Max days in a row (optional)</label>
    <input type="text" inputmode="numeric" id="maxStreakInput" placeholder="e.g. 2 — leave blank for no limit">

    <label class="field-label" for="maxWeeklyInput">Max days to play this week (optional)</label>
    <input type="text" inputmode="numeric" id="maxWeeklyInput" placeholder="e.g. 3 — even if you marked more days available">

    <button class="primary" id="submitBtn">Save my availability</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="card">
    <h2>This week's board <span class="tag subtle" id="lastRefreshedTag">Loading…</span></h2>
    <div id="missingSlot"></div>
    <div id="bestBannerSlot"></div>
    <div class="scoreboard-scroll">
      <table class="scoreboard" id="scoreboard">
        <thead><tr id="theadRow"></tr></thead>
        <tbody id="tbody"></tbody>
        <tfoot>
          <tr id="countRow"></tr>
          <tr class="stamp-row" id="stampRow"></tr>
        </tfoot>
      </table>
    </div>
    <div class="empty-state" id="emptyState" style="display:none;">No responses yet this week. Be the first to send yours in above.</div>
  </div>

  <div id="adminCardSlot"></div>

  <div style="text-align:center; margin: 30px 0 10px;">
    <button type="button" id="adminSigninBtn" style="background:none;border:none;color:var(--net-gray);opacity:0.35;font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;">Admin</button>
    <button type="button" id="adminExitBtn" style="display:none;background:none;border:none;color:var(--net-gray);opacity:0.35;font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;margin-left:10px;">Exit admin mode</button>
  </div>

</div>

<script>
(function() {
  const DOW = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const PLAYERS = ['Alex','Billy','Bob','Greg','Igal','Joe','Lewis','Peter'];
  const API_URL = '/api/availability';
  const VAPID_PUBLIC_KEY = 'BGsWtB6zkEL-X2Agy3pIeFZ0IcJA_P9AAppXnJXsw-5CsmTPM-_ckXBdQKgYnbYgn7DXcHIMt3TdF5uEEwkQRtA';

  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
    const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
    const rawData = atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
    return outputArray;
  }

  async function enablePushNotifications() {
    if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
      throw new Error('Push notifications are not supported in this browser.');
    }
    const registration = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    const permission = await Notification.requestPermission();
    if (permission !== 'granted') {
      throw new Error('Notification permission was not granted.');
    }
    let subscription = await registration.pushManager.getSubscription();
    if (!subscription) {
      subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
      });
    }
    const params = new URLSearchParams({
      action: 'subscribe',
      week: weekKey,
      key: adminKey,
      subscription: JSON.stringify(subscription)
    });
    const res = await fetch(`${API_URL}?${params.toString()}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Failed to save subscription');
  }

  const ADMIN_KEY_STORAGE = 'tennisAdminKeyStored';
  const urlParams = new URLSearchParams(window.location.search);
  let adminKey = urlParams.get('admin');

  if (adminKey) {
    // Remember it on this device so future opens (e.g. from the home-screen
    // icon, which has no address bar to type a link into) can restore it.
    try { localStorage.setItem(ADMIN_KEY_STORAGE, adminKey); } catch (e) { /* ignore */ }
  } else {
    let storedAdminKey = null;
    try { storedAdminKey = localStorage.getItem(ADMIN_KEY_STORAGE); } catch (e) { /* ignore */ }
    if (storedAdminKey) {
      window.location.replace(window.location.pathname + '?admin=' + encodeURIComponent(storedAdminKey));
      return; // page is navigating away; nothing else on this load matters
    }
  }
  const isAdmin = !!adminKey;

  function getWeekStart() {
    // The schedule opens each Saturday for the upcoming Monday–Friday.
    // Returns the most recent Saturday on/before today.
    const today = new Date();
    today.setHours(0,0,0,0);
    const daysSinceSaturday = (today.getDay() + 1) % 7; // Sat=0, Sun=1, Mon=2, ... Fri=6
    const start = new Date(today);
    start.setDate(today.getDate() - daysSinceSaturday);
    return start;
  }

  function isoDate(d) {
    return d.toISOString().slice(0,10);
  }

  const weekStart = getWeekStart(); // the opening Saturday

  // Ties in the fairness sort don't break alphabetically (which would always
  // disadvantage the same people, e.g. names late in PLAYERS). Instead, each
  // week gets its own well-mixed shuffle order for tie-breaking, seeded off
  // the week's date so it's deterministic (same for everyone, no memory
  // needed) but not a rigid repeating pattern like a simple rotation would be.
  function hashString(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = (Math.imul(31, h) + str.charCodeAt(i)) | 0; }
    return h >>> 0;
  }
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function seededShuffle(arr, seed) {
    const a = [...arr];
    const rand = mulberry32(seed);
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }
  const weekSeed = hashString(isoDate(weekStart));
  const shuffledOrder = seededShuffle(PLAYERS, weekSeed);
  const tieRank = {};
  shuffledOrder.forEach((name, i) => { tieRank[name] = i; });

  const weekDays = [];
  for (let i = 2; i <= 6; i++) { // Monday (+2) through Friday (+6) after that Saturday
    const d = new Date(weekStart);
    d.setDate(weekStart.getDate() + i);
    weekDays.push(d);
  }
  const weekKey = isoDate(weekStart);

  function fmtRange() {
    const opts = { month: 'short', day: 'numeric' };
    return weekDays[0].toLocaleDateString(undefined, opts) + ' – ' + weekDays[weekDays.length - 1].toLocaleDateString(undefined, opts);
  }
  document.getElementById('weekRange').textContent = fmtRange();

  if (isAdmin) {
    document.getElementById('adminPillSlot').innerHTML = '<div class="admin-pill">ADMIN MODE</div>';
  }

  const adminSigninBtn = document.getElementById('adminSigninBtn');
  const adminExitBtn = document.getElementById('adminExitBtn');
  if (isAdmin) {
    adminSigninBtn.textContent = 'Re-enter admin code';
    adminExitBtn.style.display = 'inline';
    adminExitBtn.addEventListener('click', () => {
      try { localStorage.removeItem(ADMIN_KEY_STORAGE); } catch (e) { /* ignore */ }
      window.location.href = window.location.pathname;
    });
  }
  adminSigninBtn.addEventListener('click', () => {
    const code = prompt('Enter admin code:');
    if (!code) return;
    try { localStorage.setItem(ADMIN_KEY_STORAGE, code); } catch (e) { /* ignore */ }
    window.location.href = window.location.pathname + '?admin=' + encodeURIComponent(code);
  });

  const nameSelect = document.getElementById('nameInput');
  PLAYERS.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    nameSelect.appendChild(opt);
  });

  const LAST_NAME_KEY = 'tennisLastPlayerName';
  const savedName = localStorage.getItem(LAST_NAME_KEY);
  if (savedName && PLAYERS.includes(savedName)) {
    nameSelect.value = savedName;
  }

  let closedDays = [];
  let actualResults = {};
  let lastDayPlans = [];
  let didInitialPopulate = false;

  // Start time rule: 6:15am if Igal is in that day's lineup, otherwise 6:30am.
  // Always finishes by 7:45am.
  const END_TIME_LABEL = '7:45am';
  const END_TIME_24 = [7, 45];
  function getStartTime24(plan) {
    const hasIgal = plan.playing.some(r => r.name === 'Igal');
    return hasIgal ? [6, 15] : [6, 30];
  }
  function getStartTime(plan) {
    const [h, m] = getStartTime24(plan);
    return `${h}:${String(m).padStart(2, '0')}am`;
  }

  const dayGrid = document.getElementById('dayGrid');
  const selected = new Set();
  const dayChips = [];
  weekDays.forEach((d, idx) => {
    const chip = document.createElement('div');
    chip.className = 'day-chip';
    chip.tabIndex = 0;
    chip.setAttribute('role', 'checkbox');
    chip.setAttribute('aria-checked', 'false');
    chip.innerHTML = `<span class="dow">${DOW[d.getDay()]}</span><span class="dnum">${d.getDate()}</span>`;
    chip.addEventListener('click', () => toggleDay(idx, chip));
    chip.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleDay(idx, chip); }
    });
    dayGrid.appendChild(chip);
    dayChips.push(chip);
  });

  function toggleDay(idx, chip) {
    if (isOut || closedDays.includes(idx)) return;
    if (selected.has(idx)) {
      selected.delete(idx);
      chip.classList.remove('selected');
      chip.setAttribute('aria-checked', 'false');
    } else {
      selected.add(idx);
      chip.classList.add('selected');
      chip.setAttribute('aria-checked', 'true');
    }
  }

    dayChips.forEach((chip, idx) => {
      const closed = closedDays.includes(idx);

      if (closed) {

      } else {
        chip.innerHTML = `<span class="dow">${DOW[weekDays[idx].getDay()]}</span><span class="dnum">${weekDays[idx].getDate()}</span>`;
      }

  let isOut = false;

  const maxWeeklyInput = document.getElementById('maxWeeklyInput');
  const noteInput = document.getElementById('noteInput');

  function setOutState(state) {
    isOut = state;
    outToggleBtn.classList.toggle('active', isOut);
    outToggleBtn.textContent = isOut ? "I'm out this week ✕" : "I'm out this week";
    maxStreakInput.disabled = isOut;

  let lastResponses = [];

  function populateFormForName(name) {
    // Reset the form first so stale data from a previously-selected name doesn't linger
    selected.clear();
    dayChips.forEach(chip => {
      chip.classList.remove('selected');
      chip.setAttribute('aria-checked', 'false');
    });
    noteInput.value = '';
    maxStreakInput.value = '';
    maxWeeklyInput.value = '';
    setOutState(false);

    const existing = lastResponses.find(r => r.name === name);
    if (!existing) return;

    if (existing.out) {
      setOutState(true);
    } else {
      existing.days.forEach(idx => {
        if (closedDays.includes(idx) || !dayChips[idx]) return;
        selected.add(idx);
        dayChips[idx].classList.add('selected');
        dayChips[idx].setAttribute('aria-checked', 'true');
      });
    }
    noteInput.value = existing.note || '';
    maxStreakInput.value = existing.maxstreak || '';
    maxWeeklyInput.value = existing.maxweekly || '';
  }

  nameSelect.addEventListener('change', () => {
    if (nameSelect.value) populateFormForName(nameSelect.value);
  });

  // Table headers
  const theadRow = document.getElementById('theadRow');
  theadRow.innerHTML = '<th class="name-col">Player</th>' +
    weekDays.map(d => `<th>${DOW[d.getDay()]}<br>${d.getMonth()+1}/${d.getDate()}</th>`).join('') +
    '<th>Notes</th>';

  async function saveResponse(name, days, note, out, maxStreak, maxWeekly) {
    const params = new URLSearchParams({
      action: 'save',
      week: weekKey,
      name: name.trim(),
      days: out ? '' : Array.from(days).join(','),
      note: note.trim(),
      out: out ? 'true' : 'false',
      maxstreak: maxStreak ? String(maxStreak) : '',
      maxweekly: maxWeekly ? String(maxWeekly) : ''
    });
    let res, text;
    try {
      res = await fetch(`${API_URL}?${params.toString()}`);
      text = await res.text();
    } catch (e) {
      throw new Error('Network request failed — check your connection.');
    }
    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      throw new Error('Backend returned an unexpected response: ' + text.slice(0, 100));
    }
    if (!res.ok || !data.ok) {
      throw new Error(data.error || `HTTP ${res.status}`);
    }
  }

  async function loadData() {
    const params = new URLSearchParams({ action: 'list', week: weekKey });
    try {
      const res = await fetch(`${API_URL}?${params.toString()}`);
      if (!res.ok) return { responses: [], closedDays: [], actualResults: {}, ok: false };
      const data = await res.json();
      return { responses: data.responses || [], closedDays: data.closedDays || [], actualResults: data.actualResults || {}, ok: true };
    } catch (e) {
      return { responses: [], closedDays: [], actualResults: {}, ok: false };
    }
  }

  async function clearAllResponses() {
    const params = new URLSearchParams({ action: 'clear', week: weekKey, key: adminKey });
    const res = await fetch(`${API_URL}?${params.toString()}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Clear failed');
  }

  async function saveClosedDays(days) {
    const params = new URLSearchParams({ action: 'setClosed', week: weekKey, key: adminKey, closedDays: days.join(',') });
    const res = await fetch(`${API_URL}?${params.toString()}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Save failed');
  }

  async function saveActualResult(dayIdx, players) {
    const params = new URLSearchParams({ action: 'setActual', week: weekKey, key: adminKey, dayIdx: String(dayIdx), players: players.join(',') });
    const res = await fetch(`${API_URL}?${params.toString()}`);
    const data = await res.json();
    if (!data.ok) throw new Error(data.error || 'Save failed');
  }

  function slugSafe(name) {
    return name.trim().toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '');
  }

  function assignFairly(responses) {
    const playCount = {};
    const currentStreak = {};
    const lastPlayedIdx = {};
    responses.forEach(r => {
      playCount[r.name] = 0;
      currentStreak[r.name] = 0;
      lastPlayedIdx[r.name] = -99;
    });
    const byName = {};
    responses.forEach(r => { byName[r.name] = r; });

    const dayPlans = weekDays.map((d, idx) => {
      if (closedDays.includes(idx)) {
        return { idx, closed: true, isActual: false, available: [], playing: [], alternates: [], cappedOut: [] };
      }

      const available = responses.filter(r => r.days.includes(idx));
      const actualNames = actualResults[String(idx)];

      let playing;
      let isActual = false;
      let cappedOut = [];

      if (actualNames) {
        // Admin has recorded who genuinely played this day — trust that
        // completely over any projection, and use it as ground truth for
        // every later day's streak/weekly counts.
        isActual = true;
        playing = actualNames.map(n => byName[n]).filter(Boolean);
      } else if (available.length < 4) {
        // Not enough people for an actual match — nobody's streak or weekly
        // count should move, since no game is really happening this day.
        playing = [];
      } else {
        // Hard caps: a player's own "max days in a row" / "max days this
        // week" limit is never overridden, even if that leaves the court
        // short of 4. The day is reported honestly as short-staffed instead.
        const wouldExceed = (r) => {
          const streakCap = r.maxstreak;
          const streakIfPlayed = lastPlayedIdx[r.name] === idx - 1 ? currentStreak[r.name] + 1 : 1;
          const streakExceeded = !!streakCap && streakIfPlayed > streakCap;

          const weeklyCap = r.maxweekly;
          const weeklyExceeded = !!weeklyCap && playCount[r.name] >= weeklyCap;

          return streakExceeded || weeklyExceeded;
        };

        const eligible = available.filter(r => !wouldExceed(r));
        cappedOut = available.filter(r => wouldExceed(r));

        const byFairness = (a, b) => {
          const diff = playCount[a.name] - playCount[b.name];
          if (diff !== 0) return diff;
          return (tieRank[a.name] ?? 99) - (tieRank[b.name] ?? 99);
        };

        playing = [...eligible].sort(byFairness).slice(0, 4);
      }

      const alternates = available.filter(r => !playing.includes(r));

      // Advance streak/weekly tracking based on who's actually playing
      // today, whether that came from a real recorded result or a
      // projection — either way it's the best-known truth for today.
      responses.forEach(r => {
        if (playing.includes(r)) {
          currentStreak[r.name] = lastPlayedIdx[r.name] === idx - 1 ? currentStreak[r.name] + 1 : 1;
          lastPlayedIdx[r.name] = idx;
          playCount[r.name]++;
        }
      });

      return { idx, closed: false, isActual, available, playing, alternates, cappedOut };
    });

    return dayPlans;
  }

  function buildICS(dateObj, startHM, endHM, title, description) {
    const pad = n => String(n).padStart(2, '0');
    const start = new Date(dateObj); start.setHours(startHM[0], startHM[1], 0, 0);
    const end = new Date(dateObj); end.setHours(endHM[0], endHM[1], 0, 0);
    const fmt = d => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}00`;
    const esc = s => String(s).replace(/([,;])/g, '\\$1');
    return [
      'BEGIN:VCALENDAR',
      'VERSION:2.0',
      'PRODID:-//NSRC Early Birds//EN',
      'BEGIN:VEVENT',
      `UID:${Date.now()}-${Math.random().toString(36).slice(2)}@sundaylineup`,
      `DTSTART:${fmt(start)}`,
      `DTEND:${fmt(end)}`,
      `SUMMARY:${esc(title)}`,
      `DESCRIPTION:${esc(description)}`,
      'END:VEVENT',
      'END:VCALENDAR'
    ].join('\r\n');
  }

  function downloadICS(icsText, filename) {
    const blob = new Blob([icsText], { type: 'text/calendar' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function buildLineupText(dayPlans) {
    const confirmedDays = dayPlans.filter(plan => !plan.closed && plan.playing.length >= 4);
    if (confirmedDays.length === 0) {
      return `NSRC Early Birds — ${fmtRange()}\n\nNo days have 4 players confirmed yet.`;
    }
    const lines = [`NSRC Early Birds — ${fmtRange()}`, ''];
    confirmedDays.forEach(plan => {
      const d = weekDays[plan.idx];
      const dateLabel = `${DOW[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`;
      const startLabel = getStartTime(plan);
      const tag = plan.isActual ? ' (confirmed)' : '';
      lines.push(`${dateLabel} (${startLabel}–${END_TIME_LABEL})${tag}: ${plan.playing.map(r => r.name).join(', ')}`);
    });
    return lines.join('\n');
  }

  function renderBoard(responses) {
    const tbody = document.getElementById('tbody');
    const countRow = document.getElementById('countRow');
    const stampRow = document.getElementById('stampRow');
    const emptyState = document.getElementById('emptyState');
    const scoreboard = document.getElementById('scoreboard');
    const bestBannerSlot = document.getElementById('bestBannerSlot');
    const missingSlot = document.getElementById('missingSlot');

    const respondedNames = responses.map(r => r.name);
    const missing = PLAYERS.filter(p => !respondedNames.includes(p));
    missingSlot.innerHTML = missing.length === 0
      ? `<div class="missing-note ok">Everyone's responded! ✅</div>`
      : `<div class="missing-note">Still waiting on: ${escapeHtml(missing.join(', '))}</div>`;

    if (responses.length === 0 && closedDays.length === 0) {
      scoreboard.style.display = 'none';
      emptyState.style.display = 'block';
      bestBannerSlot.innerHTML = '';
      return;
    }
    scoreboard.style.display = 'table';
    emptyState.style.display = 'none';

    tbody.innerHTML = responses.map(r => {
      const cells = weekDays.map((d, idx) => {
        if (closedDays.includes(idx)) return '<td><span class="mark-closed">CLOSED</span></td>';
        const has = r.days.includes(idx);
        return `<td>${has ? '<span class="mark-yes">●</span>' : '<span class="mark-no">—</span>'}</td>`;
      }).join('');
      const nameCell = r.out
        ? `${escapeHtml(r.name)}<span class="out-badge">OUT</span>`
        : escapeHtml(r.name);
      return `<tr class="${r.out ? 'is-out' : ''}"><td class="name-col">${nameCell}</td>${cells}<td class="note-cell">${escapeHtml(r.note || '')}</td></tr>`;
    }).join('');

    const counts = weekDays.map((d, idx) => closedDays.includes(idx) ? 0 : responses.filter(r => r.days.includes(idx)).length);

    countRow.innerHTML = '<td class="name-col" style="font-family:\'Space Mono\',monospace;font-size:11px;color:var(--net-gray);">Available</td>' +
      weekDays.map((d, idx) => closedDays.includes(idx)
        ? `<td style="font-family:'Space Mono',monospace;color:var(--net-gray);">—</td>`
        : `<td style="font-family:'Space Mono',monospace;font-weight:700;">${counts[idx]}</td>`
      ).join('') + '<td></td>';

    const dayPlans = assignFairly(responses);

    stampRow.innerHTML = '<td class="name-col"></td>' +
      dayPlans.map(plan => {
        if (plan.closed) {
          return `<td><span class="stamp closed">CLOSED</span><span class="count-sub">club closed</span></td>`;
        }
        const ok = plan.playing.length >= 4;
        let sub;
        if (ok && plan.alternates.length > 0) {
          sub = 'sits out: ' + plan.alternates.map(r => r.name).join(', ');
        } else if (!ok && plan.cappedOut.length > 0) {
          sub = `${plan.available.length} available, but limits leave only ${plan.playing.length}`;
        } else {
          sub = `${plan.available.length} of ${responses.length}`;
        }
        return `<td><span class="stamp ${ok ? 'in' : 'out'}">${ok ? 'IN' : 'OUT'}</span><span class="count-sub">${escapeHtml(sub)}</span></td>`;
      }).join('') + '<td></td>';

    const playCountTotal = {};
    responses.forEach(r => { playCountTotal[r.name] = 0; });
    dayPlans.forEach(plan => plan.playing.forEach(r => { playCountTotal[r.name]++; }));

    const dayLines = dayPlans.map(plan => {
      const d = weekDays[plan.idx];
      const dateLabel = `${DOW[d.getDay()]} ${d.getMonth()+1}/${d.getDate()}`;
      const confirmedTag = plan.isActual ? ` <span style="color:var(--ball-yellow);">✓ confirmed</span>` : '';
      if (plan.closed) {
        return `<div class="txt-sub">${dateLabel}: <span style="color:var(--clay)">club closed</span></div>`;
      }
      if (plan.playing.length >= 4) {
        const startLabel = getStartTime(plan);
        const altNote = plan.alternates.length > 0 ? ` <span style="color:var(--net-gray)">(sitting out: ${escapeHtml(plan.alternates.map(r => r.name).join(', '))})</span>` : '';
        return `<div class="txt-sub"><strong style="color:var(--chalk)">${dateLabel} (${startLabel}–${END_TIME_LABEL}):</strong> ${escapeHtml(plan.playing.map(r => r.name).join(', '))}${altNote}${confirmedTag} <button type="button" class="small-btn add-cal-btn" data-idx="${plan.idx}">+ Calendar</button></div>`;
      }
      if (plan.available.length === 0) {
        return `<div class="txt-sub">${dateLabel}: no one available</div>`;
      }
      if (plan.cappedOut.length > 0) {
        return `<div class="txt-sub">${dateLabel}: ${plan.available.length} available, but ${escapeHtml(plan.cappedOut.map(r => r.name).join(', '))} ${plan.cappedOut.length > 1 ? 'are' : 'is'} at their limit — only ${plan.playing.length} eligible (need 4)</div>`;
      }
      return `<div class="txt-sub">${dateLabel}: only ${plan.available.length} available (need 4) — ${escapeHtml(plan.available.map(r => r.name).join(', '))}</div>`;
    }).join('');

    const anyPlayableDay = dayPlans.some(p => p.playing.length >= 4);
    const balanceNote = anyPlayableDay
      ? `Games this week — ${Object.entries(playCountTotal).map(([n, c]) => `${escapeHtml(n)}: ${c}`).join(' · ')}`
      : 'No day has 4 people yet — need more responses to fill the court.';

    bestBannerSlot.innerHTML = `<div class="best-banner">
        <div class="ball"></div>
        <div style="flex:1;">
          <div class="txt-main">This week's lineup</div>
          ${dayLines}
          <div class="txt-sub" style="margin-top:8px;color:var(--net-gray);">${balanceNote}</div>
          <button type="button" class="copy-lineup-btn" id="copyLineupBtn">Copy lineup to clipboard</button>
        </div>
      </div>`;

    lastDayPlans = dayPlans;

    bestBannerSlot.querySelectorAll('.add-cal-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = Number(btn.dataset.idx);
        const plan = lastDayPlans.find(p => p.idx === idx);
        if (!plan) return;
        const d = weekDays[idx];
        const ics = buildICS(
          d,
          getStartTime24(plan),
          END_TIME_24,
          'NSRC Early Birds — Tennis',
          'Playing: ' + plan.playing.map(r => r.name).join(', ')
        );
        downloadICS(ics, `tennis-${isoDate(d)}.ics`);
      });
    });

    const copyBtn = document.getElementById('copyLineupBtn');
    if (copyBtn) {
      copyBtn.addEventListener('click', async () => {
        const text = buildLineupText(lastDayPlans);
        try {
          await navigator.clipboard.writeText(text);
          copyBtn.textContent = 'Copied!';
        } catch (e) {
          copyBtn.textContent = 'Copy failed — select manually';
        }
        setTimeout(() => { copyBtn.textContent = 'Copy lineup to clipboard'; }, 2000);
      });
    }
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  async function refresh() {
    const data = await loadData();
    const tag = document.getElementById('lastRefreshedTag');
    const timeLabel = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    if (!data.ok) {
      if (tag) tag.textContent = `Refresh failed at ${timeLabel} — retrying`;
      return;
    }
    closedDays = data.closedDays;
    actualResults = data.actualResults;
    lastResponses = data.responses;
    applyClosedDaysToPicker();
    renderBoard(data.responses);
    if (isAdmin) { renderAdminClosedPicker(); renderAdminActualPicker(); }
    if (tag) tag.textContent = `Updated ${timeLabel}`;
    if (!didInitialPopulate && nameSelect.value) {
      populateFormForName(nameSelect.value);
      didInitialPopulate = true;
    }
  }

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const statusMsg = document.getElementById('statusMsg');
    const name = nameSelect.value;
    if (!name) {
      statusMsg.textContent = 'Choose your name first.';
      statusMsg.style.color = 'var(--clay)';
      return;
    }
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    statusMsg.textContent = 'Saving...';
    statusMsg.style.color = 'var(--net-gray)';
    try {
      await saveResponse(name, selected, document.getElementById('noteInput').value, isOut, maxStreakInput.value, maxWeeklyInput.value);
      localStorage.setItem(LAST_NAME_KEY, name);
      statusMsg.textContent = isOut ? `Saved — see you next week, ${name}!` : `Saved — thanks, ${name}!`;
      statusMsg.style.color = 'var(--ball-yellow)';
      await refresh();
    } catch (e) {
      statusMsg.textContent = 'Could not save: ' + e.message;
      statusMsg.style.color = 'var(--clay)';
      console.error('Save error:', e);
    }
    btn.disabled = false;
  });

      msg.textContent = 'Saving...';
      try {
        await saveClosedDays(Array.from(adminSelected));
        msg.textContent = 'Saved.';
        await refresh();
      } catch (e) {
        msg.textContent = 'Error: ' + e.message;
      }
    });

    document.getElementById('clearBtn').addEventListener('click', async () => {
      if (!confirm("Clear everyone's responses for this week? This cannot be undone.")) return;
      const msg = document.getElementById('adminStatusMsg');
      try {
        await clearAllResponses();
        msg.textContent = 'Cleared.';
        await refresh();
      } catch (e) {
        msg.textContent = 'Error: ' + e.message;
      }
    });

    const actualDayGrid = document.getElementById('actualDayGrid');
    weekDays.forEach((d, idx) => {
      const chip = document.createElement('div');
      chip.className = 'day-chip admin-select';
      chip.innerHTML = `<span class="dow">${DOW[d.getDay()]}</span><span class="dnum">${d.getDate()}</span>`;
      chip.addEventListener('click', () => selectActualEditDay(idx));
      actualDayGrid.appendChild(chip);
    });
  }

  function selectActualEditDay(idx) {
    actualEditDayIdx = idx;
    const chips = document.querySelectorAll('#actualDayGrid .day-chip');
    chips.forEach((chip, i) => chip.classList.toggle('selected', i === idx));

    actualEditSelected.clear();
    const existing = actualResults[String(idx)];
    if (existing) existing.forEach(n => actualEditSelected.add(n));

    const slot = document.getElementById('actualPlayersSlot');
    slot.innerHTML = `
      <div style="margin-top:10px;">
        <div class="day-grid" id="actualPlayerChips" style="grid-template-columns: repeat(4, 1fr);"></div>
        <button class="primary admin-btn" id="saveActualBtn" style="margin-top:10px;">Save actual result for this day</button>
        <button class="link-btn" id="clearActualBtn" style="display:block;margin-top:6px;">Clear recorded result (go back to projection)</button>
        <div class="status-msg admin-status" id="actualStatusMsg"></div>
      </div>`;

    const chipGrid = document.getElementById('actualPlayerChips');
    PLAYERS.forEach(name => {
      const chip = document.createElement('div');
      chip.className = 'day-chip admin-select';
      chip.style.padding = '10px 4px';
      chip.innerHTML = `<span class="dnum" style="font-size:13px;">${escapeHtml(name)}</span>`;
      chip.classList.toggle('selected', actualEditSelected.has(name));
      chip.addEventListener('click', () => {
        if (actualEditSelected.has(name)) { actualEditSelected.delete(name); chip.classList.remove('selected'); }
        else { actualEditSelected.add(name); chip.classList.add('selected'); }
      });
      chipGrid.appendChild(chip);
    });

    document.getElementById('saveActualBtn').addEventListener('click', async () => {
      const msg = document.getElementById('actualStatusMsg');
      msg.textContent = 'Saving...';
      try {
        await saveActualResult(actualEditDayIdx, Array.from(actualEditSelected));
        msg.textContent = 'Saved.';
        await refresh();
      } catch (e) {
        msg.textContent = 'Error: ' + e.message;
      }
    });

    document.getElementById('clearActualBtn').addEventListener('click', async () => {
      const msg = document.getElementById('actualStatusMsg');
      msg.textContent = 'Clearing...';
      try {
        await saveActualResult(actualEditDayIdx, []);
        msg.textContent = 'Cleared — back to projection.';
        await refresh();
      } catch (e) {
        msg.textContent = 'Error: ' + e.message;
      }
    });
  }

  function renderAdminActualPicker() {
    const chips = document.querySelectorAll('#actualDayGrid .day-chip');
    if (chips.length === 0) return;
    chips.forEach((chip, idx) => {
      const hasActual = !!actualResults[String(idx)];
      chip.classList.toggle('closed-chip', false);
      chip.style.borderColor = hasActual ? 'var(--ball-yellow-dim)' : '';
      chip.style.opacity = hasActual ? '1' : '';
    });
  }

  function renderAdminClosedPicker() {
    const chips = document.querySelectorAll('#adminDayGrid .day-chip');
    chips.forEach((chip, idx) => {
      const on = closedDays.includes(idx);
      chip.classList.toggle('selected', on);
      if (on) adminSelected.add(idx); else adminSelected.delete(idx);
    });
  }

  if (isAdmin) {
    renderAdminCard();
  }

  refresh();

  // Auto-refresh the board periodically so people see live updates without
  // reloading. Paused while the tab is hidden/backgrounded to avoid wasted
  // requests, and resumed (with an immediate refresh) when it becomes visible.
  const POLL_INTERVAL_MS = 45000;
  let pollHandle = null;

  function startPolling() {
    if (pollHandle) return;
    pollHandle = setInterval(refresh, POLL_INTERVAL_MS);
  }

  function stopPolling() {
    if (pollHandle) {
      clearInterval(pollHandle);
      pollHandle = null;
    }
  }

  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') {
      refresh();
      startPolling();
    } else {
      stopPolling();
    }
  });

  startPolling();
})();
</script>
</body>
</html>
