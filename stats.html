<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Season Stats — NSRC Early Birds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#142B3D">
<style>
  :root {
    --court-navy: #142B3D;
    --court-navy-deep: #0B1B28;
    --panel: #1B3A50;
    --ball-yellow: #D7F23C;
    --ball-yellow-dim: #A9C22C;
    --chalk: #F2F5F0;
    --clay: #C1502B;
    --clay-dim: #8F3C20;
    --net-gray: #8CA0AF;
    --line: rgba(242,245,240,0.14);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--court-navy);
    color: var(--chalk);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 0 0 60px 0;
  }
  .header {
    background: var(--court-navy-deep);
    border-bottom: 2px solid var(--line);
    padding: 28px 20px 22px;
    text-align: center;
  }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-size: 11px;
    color: var(--ball-yellow);
  }
  h1 {
    font-family: 'Archivo Black', sans-serif;
    font-size: clamp(26px, 6vw, 38px);
    margin: 6px 0 4px;
  }
  .sub { color: var(--net-gray); font-size: 13px; font-family: 'Space Mono', monospace; }
  .season-nav a {
    color: var(--ball-yellow);
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    text-decoration: none;
    margin: 0 10px;
  }
  .season-nav a:hover { text-decoration: underline; }
  .season-nav .disabled { color: var(--net-gray); opacity: 0.4; font-size: 12px; font-family: 'Space Mono', monospace; margin: 0 10px; }
  .wrap { max-width: 760px; margin: 0 auto; padding: 28px 16px 0; }
  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 22px;
    margin-bottom: 22px;
  }
  .methodology {
    font-size: 12px;
    color: var(--net-gray);
    line-height: 1.6;
  }
  .methodology strong { color: var(--chalk); }
  .loading { text-align: center; color: var(--net-gray); padding: 40px 10px; font-family: 'Space Mono', monospace; font-size: 13px; }
  table.stats { width: 100%; border-collapse: collapse; }
  table.stats th, table.stats td { padding: 12px 8px; text-align: left; border-bottom: 1px solid var(--line); font-size: 14px; }
  table.stats th { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; color: var(--net-gray); font-weight: 400; }
  table.stats td.num, table.stats th.num { text-align: right; }
  .rank { font-family: 'Archivo Black', sans-serif; color: var(--net-gray); width: 24px; }
  .rank.top1 { color: var(--ball-yellow); }
  .rank.top2 { color: var(--chalk); }
  .rank.top3 { color: var(--clay); }
  .name-cell { font-weight: 700; }
  .savings-positive { color: var(--ball-yellow); }
  .savings-negative { color: var(--clay); }
  .breakeven-done { color: var(--ball-yellow-dim); font-size: 11px; }
  .breakeven-pending { color: var(--net-gray); font-size: 11px; }
  .back-link { display: block; text-align: center; color: var(--net-gray); font-size: 12px; font-family: 'Space Mono', monospace; text-decoration: underline; margin-top: 10px; }
  .version-tag { margin-top: 6px; font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: var(--net-gray); opacity: 0.6; }
  @media (max-width: 480px) {
    table.stats { font-size: 12px; }
    table.stats th, table.stats td { padding: 8px 4px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Tennis Availability</div>
  <h1>Season Stats</h1>
  <div class="sub" id="seasonRangeLabel">—</div>
  <div class="season-nav" id="seasonNav" style="margin-top:10px;"></div>
  <div class="version-tag">v1.7</div>
</div>

<div class="wrap">
  <div class="card" id="methodologyCard" style="display:none;">
    <div class="methodology" id="methodologyText"></div>
  </div>

  <div class="card">
    <div class="loading" id="loadingMsg">Crunching the numbers…</div>
    <table class="stats" id="statsTable" style="display:none;">
      <thead>
        <tr>
          <th></th>
          <th>Player</th>
          <th class="num">Games</th>
          <th class="num">$ / game</th>
          <th class="num">vs. daily rate</th>
          <th class="num">Break-even</th>
        </tr>
      </thead>
      <tbody id="statsBody"></tbody>
    </table>
  </div>

  <a class="back-link" href="/">← Back to the schedule</a>
</div>

<script>
(function() {
  const API_URL = '/api/availability';
  const DEFAULT_SEASON_FEE = 795;
  const DAILY_RATE = 20;
  const ASSUMED_GAMES_PER_WEEK = 2.5;
  const DEFAULT_PLAYERS_FALLBACK = ['Alex','Billy','Bob','Greg','Igal','Joe','Lewis','Peter'];

  function isoDate(d) { return d.toISOString().slice(0,10); }

  function getWeekStartFor(date) {
    const d = new Date(date);
    d.setHours(0,0,0,0);
    const daysSinceSaturday = (d.getDay() + 1) % 7; // Sat=0 ... Fri=6
    d.setDate(d.getDate() - daysSinceSaturday);
    return d;
  }

  function hashString(str) {
    let h = 0;
    for (let i = 0; i < str.length; i++) { h = (Math.imul(31, h) + str.charCodeAt(i)) | 0; }
    return h >>> 0;
  }
  function mulberry32(seed) {
    return function() {
      seed |= 0; seed = (seed + 0x6D2B79F5) | 0;
      let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
      t = (t + Math.imul(t ^ t >>> 7, 61 | t)) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  function seededShuffle(arr, seed) {
    const a = [...arr];
    const rand = mulberry32(seed);
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  async function fetchWeek(weekKey) {
    try {
      const params = new URLSearchParams({ action: 'list', week: weekKey });
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(`${API_URL}?${params.toString()}`, { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) return null;
      return await res.json();
    } catch (e) {
      return null;
    }
  }

  // Reconstructs who actually played each day of a given week — same rules
  // as the live scheduler (hard caps, weekly-seeded tie-breaks, closed days,
  // admin-confirmed actual results taking priority over the projection).
  function tallyWeek(weekKey, responses, closedDays, actualResults, players) {
    const weekDays = [];
    const start = new Date(weekKey + 'T00:00:00');
    for (let i = 2; i <= 6; i++) {
      const d = new Date(start);
      d.setDate(start.getDate() + i);
      weekDays.push(d);
    }
    const weekSeed = hashString(weekKey);
    const shuffledOrder = seededShuffle(players, weekSeed);
    const tieRank = {};
    shuffledOrder.forEach((name, i) => { tieRank[name] = i; });

    const playCount = {};
    const currentStreak = {};
    const lastPlayedIdx = {};
    responses.forEach(r => { playCount[r.name] = 0; currentStreak[r.name] = 0; lastPlayedIdx[r.name] = -99; });

    const tally = {};

    weekDays.forEach((d, idx) => {
      if (closedDays.includes(idx)) return;
      const actualNames = actualResults[String(idx)];
      let playing;
      let playingNames;

      if (actualNames) {
        playingNames = actualNames;
        playing = responses.filter(r => actualNames.includes(r.name));
      } else {
        const available = responses.filter(r => r.days.includes(idx));
        if (available.length < 4) return;
        const wouldExceed = (r) => {
          const streakCap = r.maxstreak;
          const streakIfPlayed = lastPlayedIdx[r.name] === idx - 1 ? currentStreak[r.name] + 1 : 1;
          const streakExceeded = !!streakCap && streakIfPlayed > streakCap;
          const weeklyCap = r.maxweekly;
          const weeklyExceeded = !!weeklyCap && playCount[r.name] >= weeklyCap;
          return streakExceeded || weeklyExceeded;
        };
        const eligible = available.filter(r => !wouldExceed(r));
        const byFairness = (a, b) => {
          const diff = playCount[a.name] - playCount[b.name];
          if (diff !== 0) return diff;
          return (tieRank[a.name] ?? 99) - (tieRank[b.name] ?? 99);
        };
        const provisional = [...eligible].sort(byFairness).slice(0, 4);
        playing = provisional.length >= 4 ? provisional : [];
        playingNames = playing.map(r => r.name);
      }

      responses.forEach(r => {
        if (playing.includes(r)) {
          currentStreak[r.name] = lastPlayedIdx[r.name] === idx - 1 ? currentStreak[r.name] + 1 : 1;
          lastPlayedIdx[r.name] = idx;
          playCount[r.name]++;
        }
      });

      playingNames.forEach(n => { tally[n] = (tally[n] || 0) + 1; });
    });

    return tally;
  }

  function escapeHtml(s) {
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function fmtMoney(n) {
    return '$' + n.toFixed(2).replace(/\.00$/, '');
  }

  async function fetchPayments(seasonYear) {
    try {
      const params = new URLSearchParams({ action: 'getPayments', season: String(seasonYear) });
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 10000);
      const res = await fetch(`${API_URL}?${params.toString()}`, { signal: controller.signal });
      clearTimeout(timeoutId);
      if (!res.ok) return {};
      const data = await res.json();
      return data.payments || {};
    } catch (e) {
      return {};
    }
  }

  async function run() {
    const today = new Date();
    const currentWeekStart = getWeekStartFor(today);
    const currentWeekKey = isoDate(currentWeekStart);

    // Season runs June 1 through the following May 31. In Jan–May, "today's"
    // season actually started the PREVIOUS June, not this year's.
    const currentSeasonYear = today.getMonth() >= 5 ? today.getFullYear() : today.getFullYear() - 1;

    const urlParams = new URLSearchParams(window.location.search);
    const requestedSeason = parseInt(urlParams.get('season'), 10);
    const seasonYear = Number.isInteger(requestedSeason) ? requestedSeason : currentSeasonYear;
    const isCurrentSeason = seasonYear === currentSeasonYear;

    const seasonStartWeek = getWeekStartFor(new Date(seasonYear, 5, 1)); // June 1

    let endBoundary;
    if (isCurrentSeason) {
      endBoundary = currentWeekStart;
    } else {
      const nextSeasonStart = getWeekStartFor(new Date(seasonYear + 1, 5, 1));
      endBoundary = new Date(nextSeasonStart);
      endBoundary.setDate(endBoundary.getDate() - 7);
    }

    // Season nav links
    const navSlot = document.getElementById('seasonNav');
    const nextIsFuture = (seasonYear + 1) > currentSeasonYear;
    const seasonLabel = `${seasonYear}–${String(seasonYear + 1).slice(2)}${isCurrentSeason ? ' (current)' : ''}`;
    navSlot.innerHTML = `
      <a href="?season=${seasonYear - 1}">← ${seasonYear - 1}–${String(seasonYear).slice(2)}</a>
      <strong style="color:var(--chalk); font-family:'Space Mono',monospace; font-size:12px; margin:0 6px;">${seasonLabel}</strong>
      ${nextIsFuture ? `<span class="disabled">${seasonYear + 1}–${String(seasonYear + 2).slice(2)} →</span>` : `<a href="?season=${seasonYear + 1}">${seasonYear + 1}–${String(seasonYear + 2).slice(2)} →</a>`}
    `;

    const weekKeyForFetch = isoDate(currentWeekStart);
    const [currentData, payments] = await Promise.all([fetchWeek(weekKeyForFetch), fetchPayments(seasonYear)]);
    const players = (currentData && currentData.players && currentData.players.length > 0)
      ? currentData.players
      : DEFAULT_PLAYERS_FALLBACK;

    const weekStarts = [];
    let cursor = new Date(seasonStartWeek);
    while (cursor <= endBoundary) {
      weekStarts.push(new Date(cursor));
      cursor = new Date(cursor);
      cursor.setDate(cursor.getDate() + 7);
    }

    const realTally = {};
    players.forEach(p => { realTally[p] = 0; });
    let assumedWeeksCount = 0;
    let realWeeksCount = 0;

    const weekDataList = await Promise.all(weekStarts.map(ws => {
      const wk = isoDate(ws);
      return (wk === currentWeekKey) ? Promise.resolve(currentData) : fetchWeek(wk);
    }));

    weekStarts.forEach((ws, i) => {
      const wk = isoDate(ws);
      const data = weekDataList[i];
      const hasAnyData = data && (
        (data.responses && data.responses.length > 0) ||
        (data.closedDays && data.closedDays.length > 0) ||
        (data.actualResults && Object.keys(data.actualResults).length > 0)
      );
      if (!hasAnyData) {
        assumedWeeksCount++;
        return;
      }
      realWeeksCount++;
      const weekTally = tallyWeek(wk, data.responses || [], data.closedDays || [], data.actualResults || {}, players);
      Object.entries(weekTally).forEach(([name, count]) => {
        realTally[name] = (realTally[name] || 0) + count;
      });
    });

    // Show anyone who has real recorded games this season, even if they've
    // since been removed from the current roster — their history shouldn't
    // vanish just because the roster changed later. Conversely, someone
    // added to the roster recently only gets credit for real weeks they
    // actually appear in, never for estimated pre-tracking weeks in a
    // season before they joined.
    const displayRoster = Array.from(new Set([...players, ...Object.keys(realTally)]));

    const finalStats = displayRoster.map(name => {
      const paymentInfo = payments[name] || {};
      const seasonFee = paymentInfo.amount || DEFAULT_SEASON_FEE;
      const months = paymentInfo.months || 12;
      const isCurrentRosterMember = players.includes(name);
      // Weeks before real tracking began have no data at all, so they're
      // estimated — but only for people currently on the roster (we have no
      // record of who was actually around during those untracked weeks),
      // and scaled to how much of the season this person paid for.
      const personAssumedBaseline = isCurrentRosterMember
        ? Math.round(assumedWeeksCount * ASSUMED_GAMES_PER_WEEK * (months / 12))
        : 0;
      const total = personAssumedBaseline + (realTally[name] || 0);
      const breakevenGames = Math.ceil(seasonFee / DAILY_RATE);
      const costPerGame = total > 0 ? seasonFee / total : null;
      const payPerDayEquivalent = total * DAILY_RATE;
      const savings = payPerDayEquivalent - seasonFee;
      return { name, total, seasonFee, months, breakevenGames, costPerGame, savings, isCurrentRosterMember };
    }).sort((a, b) => b.total - a.total);

    const assumedBaselineTotal = Math.round(assumedWeeksCount * ASSUMED_GAMES_PER_WEEK);

    // Render methodology
    const opts = { month: 'short', day: 'numeric', year: 'numeric' };
    const rangeEndLabel = isCurrentSeason ? today : endBoundary;
    document.getElementById('seasonRangeLabel').textContent =
      `${seasonStartWeek.toLocaleDateString(undefined, opts)} – ${rangeEndLabel.toLocaleDateString(undefined, opts)}${isCurrentSeason ? ' (in progress)' : ''}`;

    const methodologyCard = document.getElementById('methodologyCard');
    const methodologyText = document.getElementById('methodologyText');
    methodologyText.innerHTML = `
      <strong>How this is calculated:</strong> season runs from June 1. For the
      ${assumedWeeksCount} week${assumedWeeksCount === 1 ? '' : 's'} before detailed tracking was in place,
      games are estimated at ${ASSUMED_GAMES_PER_WEEK}/week (~${assumedBaselineTotal} games at a full
      12-month rate), scaled down for anyone paying for fewer months. For the
      ${realWeeksCount} week${realWeeksCount === 1 ? '' : 's'} since, games reflect actual recorded
      lineups. Cost and break-even use each person's own season payment and months paid for
      <em>that season</em> (defaults to $${DEFAULT_SEASON_FEE} / 12 months unless set otherwise
      in the admin panel). Players who've since left the roster still show their real recorded
      games for seasons they played in — just no pre-tracking estimate, since there's no way to
      know how long they'd been part of the group before tracking began.
    `;
    methodologyCard.style.display = 'block';

    // Render table
    const tbody = document.getElementById('statsBody');
    tbody.innerHTML = finalStats.map((s, i) => {
      const rank = i + 1;
      const rankClass = rank === 1 ? 'top1' : rank === 2 ? 'top2' : rank === 3 ? 'top3' : '';
      const costCell = s.costPerGame !== null ? fmtMoney(s.costPerGame) : '—';
      const savingsCell = s.total > 0
        ? `<span class="${s.savings >= 0 ? 'savings-positive' : 'savings-negative'}">${s.savings >= 0 ? '+' : '−'}${fmtMoney(Math.abs(s.savings))}</span>`
        : '—';
      const breakevenCell = s.total >= s.breakevenGames
        ? `<span class="breakeven-done">✓ broke even ${s.total - s.breakevenGames > 0 ? (s.total - s.breakevenGames) + ' ago' : ''}</span>`
        : `<span class="breakeven-pending">${s.breakevenGames - s.total} to go</span>`;
      const monthsNote = s.months !== 12
        ? ` <span style="color:var(--net-gray); font-weight:400; font-size:11px;">(${s.months}mo)</span>`
        : '';
      const formerNote = !s.isCurrentRosterMember
        ? ` <span style="color:var(--net-gray); font-weight:400; font-size:11px;">(no longer on roster)</span>`
        : '';
      return `<tr>
        <td class="rank ${rankClass}">${rank}</td>
        <td class="name-cell">${escapeHtml(s.name)}${monthsNote}${formerNote}</td>
        <td class="num">${s.total}</td>
        <td class="num">${costCell}</td>
        <td class="num">${savingsCell}</td>
        <td class="num">${breakevenCell}</td>
      </tr>`;
    }).join('');

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('statsTable').style.display = 'table';
  }

  run().catch((e) => {
    console.error('Season Stats failed:', e);
    const loadingMsg = document.getElementById('loadingMsg');
    loadingMsg.textContent = "Couldn't load this season's stats — try refreshing, or check back in a bit.";
    loadingMsg.style.color = 'var(--clay)';
  });
})();
</script>
</body>
</html>
